name: Build VrocoLauncher

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar \
            -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool \
            -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool

      - name: Validate Manifest Package Name
        run: |
          PKG=$(grep -o 'package="[^"]*"' AndroidManifest.xml | head -1)
          echo "=== PACKAGE NAME CHECK ==="
          echo "Found: $PKG"
          if echo "$PKG" | grep -q "com.vroco.launcher"; then
            echo "✅ Package name correct"
          else
            echo "❌ WRONG PACKAGE NAME — still using old package!"
            echo "Expected: package=\"com.vroco.launcher\""
            echo "Got: $PKG"
            exit 1
          fi
          echo ""
          echo "=== SHARED USER ID CHECK ==="
          if grep -q "sharedUserId" AndroidManifest.xml; then
            echo "❌ sharedUserId still present — will cause install failure as user app"
            grep "sharedUserId" AndroidManifest.xml
            exit 1
          else
            echo "✅ sharedUserId removed"
          fi

      - name: Build APK
        run: |
          echo "=== APKTOOL BUILD ==="
          apktool b . -o VrocoLauncher-unsigned.apk --use-aapt2 2>&1 | tee build.log
          echo ""
          echo "=== BUILD WARNINGS ==="
          grep -i "warn\|error\|fail" build.log || echo "No warnings/errors"
          echo ""
          echo "=== APK SIZE ==="
          ls -lh VrocoLauncher-unsigned.apk

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore vroco.jks \
            -alias vroco \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass vrocosign -keypass vrocosign \
            -dname "CN=Vroco, O=VrocoLauncher, C=US"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          echo "=== SIGNING WITH BUILD TOOLS: $BUILD_TOOLS ==="
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks vroco.jks \
            --ks-pass pass:vrocosign \
            --key-pass pass:vrocosign \
            --ks-key-alias vroco \
            --out VrocoLauncher.apk \
            VrocoLauncher-unsigned.apk
          echo "✅ Sign complete"

      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          echo "=== APK VERIFICATION ==="
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner verify \
            --verbose VrocoLauncher.apk
          echo ""
          echo "=== APK PACKAGE INFO (aapt) ==="
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/aapt dump badging VrocoLauncher.apk \
            | grep -E "package|sdkVersion|uses-permission:.*INSTALL|launchable"
          echo ""
          echo "=== FINAL APK SIZE ==="
          ls -lh VrocoLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VrocoLauncher-${{ github.run_number }}
          path: VrocoLauncher.apk
          retention-days: 30

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
