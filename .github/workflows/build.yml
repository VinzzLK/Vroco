name: Build VrocoLauncher

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar \
            -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool \
            -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool

      - name: Validate Manifest
        run: |
          echo "=== PACKAGE NAME ==="
          grep -o 'package="[^"]*"' AndroidManifest.xml | head -1
          echo "=== SHARED USER ID (must be empty) ==="
          grep "sharedUserId" AndroidManifest.xml && exit 1 || echo "CLEAN"
          echo "=== EXTRACT NATIVE LIBS ==="
          grep "extractNativeLibs" AndroidManifest.xml

      - name: Build APK
        run: |
          echo "=== APKTOOL BUILD ==="
          apktool b . -o VrocoLauncher-raw.apk --use-aapt2 2>&1 | tee build.log
          echo "=== WARNINGS/ERRORS ==="
          grep -iE "warn|error|fail|exception" build.log || echo "None"

      - name: Zipalign
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          echo "=== ZIPALIGN (build-tools: $BUILD_TOOLS) ==="
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -v -p 4 \
            VrocoLauncher-raw.apk VrocoLauncher-unsigned.apk
          echo "=== VERIFY ALIGNMENT ==="
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -c -v 4 VrocoLauncher-unsigned.apk \
            && echo "✅ Aligned" || echo "❌ Not aligned"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore vroco.jks -alias vroco \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass vrocosign -keypass vrocosign \
            -dname "CN=Vroco, O=VrocoLauncher, C=US"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks vroco.jks \
            --ks-pass pass:vrocosign \
            --key-pass pass:vrocosign \
            --ks-key-alias vroco \
            --out VrocoLauncher.apk \
            VrocoLauncher-unsigned.apk

      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          echo "=== SIGNATURE VERIFY ==="
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner verify --verbose VrocoLauncher.apk
          echo ""
          echo "=== PACKAGE INFO ==="
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/aapt dump badging VrocoLauncher.apk \
            | grep -E "^package|sdkVersion|launchable"
          echo ""
          echo "=== SIZE ==="
          ls -lh VrocoLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VrocoLauncher-${{ github.run_number }}
          path: VrocoLauncher.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
